<!DOCTYPE html>
<html>
  <head>
    <title>BUS</title>
  </head>
  <body>
    <img src="image-removebg-preview.png">
    <div>Attendance</div>
    <div>
      <input type="text" id="inn" placeholder="SEND NOTIFICATION">
    </div>
    <button onclick="direct1()">SUBMIT</button>

    <script>
      function direct1() {
        // Get the value of the input field
        const element = document.getElementById("inn").value;

        // Redirect to Notifications.html with the input as a URL parameter
        window.location.href = `Notifications.html?user=${encodeURIComponent(element)}`;
      }
    </script>
  </body>
</html>
