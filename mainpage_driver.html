<!DOCTYPE html>
<html>
  <head>
    <title>BUS</title>
  </head>
  <body>
    <img src="image-removebg-preview.png">
    <div>Attendance</div>
    <div>
      <input type="text" id="inn" placeholder="SEND NOTIFICATION">
    </div>
    <button onclick="direct1()">SUBMIT</button>

    <script>
      function direct1() {
        // Get the value of the input field
        const element = document.getElementById("inn").value;
        let notifications = JSON.parse(localStorage.getItem("element") || "[]");
        notifications.push(element);
        localStorage.setItem("notifications", JSON.stringify(notifications));
      }
    </script>
  </body>
</html>
