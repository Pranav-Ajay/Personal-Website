<!DOCTYPE html>
<html>
  <head>
    <title>Notifications</title>
    <style>
      table {
        width: 50%;
        border-collapse: collapse;
        margin: 20px 0;
      }
      td {
        border: 1px solid #000;
        padding: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h2>Notifications</h2>

    <table id="notificationTable">
      <tr><td></td></tr>
      <tr><td></td></tr>
      <tr><td></td></tr>
      <tr><td></td></tr>
      <tr><td></td></tr>
      <tr><td></td></tr>
      <tr><td></td></tr>
    </table>

    <script>
       const table = document.getElementById('notificationTable');

      // Load notifications from localStorage
      const notifications = JSON.parse(localStorage.getItem("notifications") || "[]");

      // Populate the table dynamically
      notifications.forEach((msg, index) => {
        const newRow = table.insertRow(); // create new row
        const cell1 = newRow.insertCell(0); // serial number
        const cell2 = newRow.insertCell(1); // message

        cell1.innerText = index + 1;
        cell2.innerText = msg;
      })
    </script>
  </body>
</html>
