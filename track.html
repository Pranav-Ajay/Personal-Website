<!DOCTYPE html>
<html>
  <head>
    <title>Bus Tracking on Road</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtcwmEdn1igP4EvgHks1x1SuIFsoPzhTw"></script>
    <style>
      #map { height: 500px; width: 100%; }
    </style>
  </head>
  <body>
    <h2>College Bus Tracking</h2>
    <div id="map"></div>

    <script>
      let map, busMarker, directionsService, directionsRenderer;
      let routePath = []; // coordinates along the road
      let index = 0;

      function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
          zoom: 14,
          center: { lat: 9.9718, lng: 76.2875 } // start
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: true });

        // Start and end points
        const start = { lat: 9.9718, lng: 76.2875 }; // Panampilly Nagar
        const end = { lat: 10.0275, lng: 76.3143 }; // Rajagiri School

        const request = {
          origin: start,
          destination: end,
          travelMode: 'DRIVING'
        };

        // Request route from Google Maps
        directionsService.route(request, (result, status) => {
          if (status === 'OK') {
            directionsRenderer.setDirections(result);

            // Extract the polyline path
            const legs = result.routes[0].legs;
            for (let i = 0; i < legs.length; i++) {
              const steps = legs[i].steps;
              for (let j = 0; j < steps.length; j++) {
                const nextSegment = steps[j].path;
                nextSegment.forEach(coord => routePath.push(coord));
              }
            }

            // Add bus marker
            busMarker = new google.maps.Marker({
              position: routePath[0],
              map: map,
              title: "College Bus 🚌"
            });

            moveBus();
          } else {
            alert("Directions request failed: " + status);
          }
        });
      }

      // Animate bus along road path
      function moveBus() {
        setInterval(() => {
          index = (index + 1) % routePath.length;
          busMarker.setPosition(routePath[index]);
          map.panTo(routePath[index]);
        }, 200); // move every 0.2 seconds for smoother animation
      }

      window.onload = initMap;
    </script>
  </body>
</html>
